AWSTemplateFormatVersion: '2010-09-09'
Description: AWS ECS Deployment for Indian Farmer Assistance App (Low Resources)
Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: Select your existing VPC
  Subnets:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Select at least two subnets in your VPC
Resources:
  EcsCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: farmer-ecs-cluster
  EcsTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Statement:
        - Effect: Allow
          Principal:
            Service:
            - ecs-tasks.amazonaws.com
          Action:
          - sts:AssumeRole
      ManagedPolicyArns:
      - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
      - PolicyName: EcsLogsPolicy
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Effect: Allow
            Action:
            - logs:CreateLogGroup
            - logs:CreateLogStream
            - logs:PutLogEvents
            Resource: arn:aws:logs:*:*:*
  CloudMapNamespace:
    Type: AWS::ServiceDiscovery::PrivateDnsNamespace
    Properties:
      Name: farmer-network.local
      Vpc:
        Ref: VpcId
  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow internal communication and API Gateway access
      VpcId:
        Ref: VpcId
      SecurityGroupIngress:
      - IpProtocol: tcp
        FromPort: 8080
        ToPort: 8080
        CidrIp: 0.0.0.0/0
      - IpProtocol: tcp
        FromPort: 80
        ToPort: 80
        CidrIp: 0.0.0.0/0
      - IpProtocol: tcp
        FromPort: 443
        ToPort: 443
        CidrIp: 0.0.0.0/0
      - IpProtocol: '-1'
        SourceSecurityGroupId:
          Ref: AWS::NoValue # Replaced later in a workaround, or using an explicit Cidr for VPC. Let's use VPC CIDR to be safe since self-reference in CFN can be tricky.
        CidrIp: 172.31.0.0/16
  AppLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: farmer-alb
      Subnets:
        Ref: Subnets
      SecurityGroups:
      - Fn::GetAtt:
        - SecurityGroup
        - GroupId
      Type: application
  ApiGatewayTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: api-gateway-targets
      Port: 8080
      Protocol: HTTP
      VpcId:
        Ref: VpcId
      TargetType: ip
      HealthCheckPath: /actuator/health
      Matcher:
        HttpCode: '200'
  FrontendTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: frontend-targets
      Port: 4200
      Protocol: HTTP
      VpcId:
        Ref: VpcId
      TargetType: ip
  AlbListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      DefaultActions:
      - Type: redirect
        RedirectConfig:
          Protocol: HTTPS
          Port: '443'
          StatusCode: HTTP_301
      LoadBalancerArn:
        Ref: AppLoadBalancer
      Port: 80
      Protocol: HTTP
  AlbHttpsListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      DefaultActions:
      - Type: forward
        TargetGroupArn:
          Ref: FrontendTargetGroup
      LoadBalancerArn:
        Ref: AppLoadBalancer
      Port: 443
      Protocol: HTTPS
      Certificates:
      - CertificateArn: arn:aws:acm:us-east-1:211125690509:certificate/ed191740-e8e9-44a2-b9a0-f5d4e34170e5
  ApiGatewayRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      Actions:
      - Type: forward
        TargetGroupArn:
          Ref: ApiGatewayTargetGroup
      Conditions:
      - Field: path-pattern
        Values:
        - /api/*
        - /actuator/*
      ListenerArn:
        Ref: AlbHttpsListener
      Priority: 10
  ApiGatewayTaskDef:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: api-gateway
      Cpu: '512'
      Memory: '1024'
      NetworkMode: awsvpc
      RequiresCompatibilities:
      - FARGATE
      ExecutionRoleArn:
        Ref: EcsTaskExecutionRole
      ContainerDefinitions:
      - Name: api-gateway
        Image: 211125690509.dkr.ecr.us-east-1.amazonaws.com/farmer-api-gateway:latest
        PortMappings:
        - ContainerPort: 8080
          Protocol: tcp
        Environment:
        - Name: SPRING_PROFILES_ACTIVE
          Value: prod
        - Name: SPRING_DATASOURCE_URL
          Value: jdbc:postgresql://<YOUR_RDS_ENDPOINT>:5432/postgres
        - Name: SPRING_DATASOURCE_USERNAME
          Value: farmer
        - Name: SPRING_DATASOURCE_PASSWORD
          Value: <YOUR_DB_PASSWORD>
        - Name: JWT_SECRET
          Value: <YOUR_JWT_SECRET>
        LogConfiguration:
          LogDriver: awslogs
          Options:
            awslogs-group: /ecs/farmer-api-gateway
            awslogs-region: us-east-1
            awslogs-stream-prefix: ecs
            awslogs-create-group: 'true'
  ApiGatewayDiscoveryService:
    Type: AWS::ServiceDiscovery::Service
    Properties:
      Name: api-gateway
      DnsConfig:
        NamespaceId:
          Ref: CloudMapNamespace
        DnsRecords:
        - Type: A
          TTL: 60
      HealthCheckCustomConfig:
        FailureThreshold: 1
  ApiGatewayEcsService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: api-gateway
      Cluster:
        Ref: EcsCluster
      TaskDefinition:
        Ref: ApiGatewayTaskDef
      LaunchType: FARGATE
      DesiredCount: 1
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          SecurityGroups:
          - Fn::GetAtt:
            - SecurityGroup
            - GroupId
          Subnets:
            Ref: Subnets
      ServiceRegistries:
      - RegistryArn:
          Fn::GetAtt:
          - ApiGatewayDiscoveryService
          - Arn
      LoadBalancers:
      - ContainerName: api-gateway
        ContainerPort: 8080
        TargetGroupArn:
          Ref: ApiGatewayTargetGroup
      DeploymentConfiguration:
        DeploymentCircuitBreaker:
          Enable: true
          Rollback: true
    DependsOn: AlbListener
  UserServiceTaskDef:
    Type: AWS::ECS::TaskDefinition
