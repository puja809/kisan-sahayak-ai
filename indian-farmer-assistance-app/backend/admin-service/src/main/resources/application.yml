server:
  port: ${ADMIN_SERVICE_PORT:8091}

spring:
  application:
    name: admin-service
  datasource:
    url: ${ADMIN_DB_URL:jdbc:postgresql://localhost:5432/farmer_assistance}
    username: ${ADMIN_DB_USERNAME:postgres}
    password: ${ADMIN_DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
  data:
    mongodb:
      uri: ${ADMIN_MONGODB_URI:mongodb://localhost:27017/farmer_assistance}
      database: farmer_assistance
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 50MB

# Custom application configuration
app:
  session-id: c05a946fe7c08b9859bbcc2813af5fd177f1a2c9ebcc657343605e380196a165
  table-prefix: sess_c05a946fe_
  jwt:
    secret: ${JWT_SECRET:indian-farmer-assistance-app-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm}
    expiration: ${JWT_EXPIRATION:86400000}
    refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}
    issuer: ${JWT_ISSUER:indian-farmer-assistance}
  document:
    max-size-mb: 50
    allowed-formats:
      - PDF
      - DOCX
      - TXT
    retention-days: 30
  retention:
    crop-years: 5
    crop-cycles: 10
    error-log-days: 90
    warn-log-days: 60
    info-log-days: 30
    debug-log-days: 7

# AWS S3 Configuration
aws:
  s3:
    bucket-name: ${AWS_S3_BUCKET_NAME:krishi-sahayak-docs}
    region: ${AWS_REGION:us-east-1}
    access-key: ${AWS_S3_ACCESS_KEY:}
    secret-key: ${AWS_S3_SECRET_KEY:}
    documents-path: ${AWS_S3_DOCUMENTS_PATH:documents/}

# Actuator endpoints for monitoring
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized

# Logging configuration
logging:
  level:
    root: INFO
    com.farmer.admin: DEBUG
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN

# Swagger/OpenAPI Configuration
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
  show-actuator: true
  use-fqn: true