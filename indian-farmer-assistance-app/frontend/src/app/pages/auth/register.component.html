<div class="register-container">
  <div class="register-card">
    <h1>Indian Farmer Assistance</h1>
    <h2>Register</h2>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="name">Full Name*</label>
        <div class="input-with-icon">
          <i class="icon-user">👤</i>
          <input id="name" type="text" formControlName="name" placeholder="Enter your full name" class="form-control" />
        </div>
        <div *ngIf="registerForm.get('name')?.invalid && registerForm.get('name')?.touched" class="error">
          Name is required (min 2 characters)
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email Address*</label>
        <div class="input-with-icon">
          <i class="icon-email">📧</i>
          <input id="email" type="email" formControlName="email" placeholder="Enter your email" class="form-control" />
        </div>
        <div *ngIf="registerForm.get('email')?.invalid && registerForm.get('email')?.touched" class="error">
          <span *ngIf="registerForm.get('email')?.errors?.['required']">Email is required</span>
          <span *ngIf="registerForm.get('email')?.errors?.['email']">Please enter a valid email</span>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password*</label>
        <div class="input-with-icon">
          <i class="icon-password">🔒</i>
          <input id="password" type="password" formControlName="password" placeholder="Enter your password"
            class="form-control" />
        </div>
        <div *ngIf="registerForm.get('password')?.invalid && registerForm.get('password')?.touched" class="error">
          Password must be at least 6 characters
        </div>
      </div>

      <div class="form-group">
        <label for="phone">Phone Number (Optional)</label>
        <div class="input-with-icon">
          <i class="icon-phone">📞</i>
          <input id="phone" type="tel" formControlName="phone" placeholder="Enter your phone number"
            class="form-control" />
        </div>
        <div *ngIf="registerForm.get('phone')?.invalid && registerForm.get('phone')?.touched" class="error">
          Please enter a valid 10-digit phone number
        </div>
      </div>

      <div class="form-row">
        <div class="form-group half">
          <label for="state">State</label>
          <select id="state" formControlName="state" class="form-control" (change)="onStateChange()">
            <option value="">Select State</option>
            <option *ngFor="let state of states" [value]="state.stateName">{{ state.stateName }}</option>
          </select>
        </div>
        <div class="form-group half">
          <label for="district">District</label>
          <select id="district" formControlName="district" class="form-control">
            <option value="">Select District</option>
            <option *ngFor="let dist of districts" [value]="dist.districtName">{{ dist.districtName }}</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group half">
          <label for="village">Village</label>
          <input id="village" type="text" formControlName="village" class="form-control" placeholder="Village">
        </div>
        <div class="form-group half">
          <label for="pinCode">PIN Code</label>
          <input id="pinCode" type="text" formControlName="pinCode" class="form-control" placeholder="6-digit PIN">
        </div>
      </div>

      <button type="submit" [disabled]="!registerForm.valid || isLoading" class="btn-submit">
        <span class="btn-text">{{ isLoading ? 'Processing...' : 'Register' }}</span>
        <span class="btn-loader" *ngIf="isLoading"></span>
      </button>
    </form>

    <p class="login-link">
      Already have an account? <a (click)="goToLogin()">Login here</a>
    </p>
  </div>
</div>
