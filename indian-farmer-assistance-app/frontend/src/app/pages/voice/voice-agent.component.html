<div class="voice-agent-wrapper">
  <!-- Chat Header -->
  <header class="chat-header">
    <div class="assistant-info">
      <div class="avatar-container">
        <span class="avatar-icon">🌾</span>
        <span class="status-dot"></span>
      </div>
      <div class="assistant-details">
        <h3>Krishi Assistant</h3>
        <span class="online-status">Online</span>
      </div>
    </div>
    <div class="header-actions">
      <select class="lang-select" [(ngModel)]="selectedLanguage" (change)="onLanguageChange()">
        <option *ngFor="let lang of languages" [value]="lang.name">
          {{ lang.nativeName }}
        </option>
      </select>
      <button class="btn-icon-clear" (click)="clearHistory()" [disabled]="conversationHistory.length === 0"
        title="Clear Chat">
        🗑️
      </button>
    </div>
  </header>

  <!-- Chat Area -->
  <div class="chat-area" #chatContainer>
    <div class="chat-background"></div>

    <div class="welcome-banner" *ngIf="conversationHistory.length === 0">
      <div class="welcome-card">
        <span class="welcome-icon">👋</span>
        <p>Namaste! I am your Krishi Assistant.</p>
        <p class="subtitle">Ask me anything about farming, weather, or government schemes.</p>
      </div>
    </div>

    <div class="messages-list">
      <div *ngFor="let message of conversationHistory" class="message-row">
        <!-- User Message Bubble -->
        <div class="bubble user-bubble">
          <p>{{ message.userText }}</p>
          <span class="message-time">{{ message.timestamp | date:'HH:mm' }}</span>
        </div>

        <!-- Assistant Message Bubble -->
        <div class="bubble assistant-bubble" *ngIf="message.systemResponse">
          <p [innerHTML]="message.safeSystemResponse"></p>
          <div class="bubble-actions" *ngIf="message.systemAudioBase64">
            <button class="btn-play" (click)="playAudio(message.systemAudioBase64!)">
              ▶️ Listen
            </button>
          </div>
          <span class="message-time">{{ message.timestamp | date:'HH:mm' }}</span>
        </div>
      </div>

      <!-- Processing State -->
      <div class="message-row" *ngIf="isProcessing">
        <div class="bubble assistant-bubble typing">
          <span class="dot"></span><span class="dot"></span><span class="dot"></span>
        </div>
      </div>
    </div>
  </div>

  <!-- Bottom Input Bar -->
  <footer class="chat-footer">
    <div class="input-wrapper">
      <button class="btn-mode" (click)="switchMode(inputMode === 'text' ? 'voice' : 'text')">
        {{ inputMode === 'text' ? '🎤' : '💬' }}
      </button>

      <div class="input-container" *ngIf="inputMode === 'text'">
        <input type="text" [(ngModel)]="textInput" placeholder="Type a message..." (keyup.enter)="sendTextQuery()"
          [disabled]="isProcessing" />
      </div>

      <div class="voice-status-container" *ngIf="inputMode === 'voice'">
        <div class="recording-ui" *ngIf="isRecording">
          <span class="rec-dot"></span>
          <span class="rec-timer">{{ recordingDuration }}s</span>
          <span class="rec-text">Recording...</span>
        </div>
        <div class="voice-placeholder" *ngIf="!isRecording">
          Tap microphone to record
        </div>
      </div>

      <button class="btn-main-action" [class.recording]="isRecording"
        (click)="inputMode === 'text' ? sendTextQuery() : toggleRecording()"
        [disabled]="inputMode === 'text' && !textInput.trim() && !isProcessing">
        <span *ngIf="inputMode === 'text'">➤</span>
        <span *ngIf="inputMode === 'voice'">{{ isRecording ? '⏹' : '🎤' }}</span>
      </button>
    </div>
  </footer>
</div>
